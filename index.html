    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;

  <style>

<body>
<div class="wrapper">

    <div class="btnWrapper">
      <a href="https://line.me/R/ti/p/@h1788" class="goLine" data-area="main_cta">
        <img src="assets/btn.png" class="btn">
      </a>
    </div>
  </div>
</div>

<script>
(function () {
  var LINE_URL = window.APP_CONFIG.LINE_URL;
  var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;
  var hasClicked = false;

  function uuid(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  function fireEvents(area){
    var base = {
      content_name:"line_contact_click",
      content_category:"line_redirect",
      contact_method:"line",
      click_area:area || "main_cta",
      destination:"official_line"
    };

    fbq('track','Contact',base,{eventID:'c_'+uuid()});
    fbq('track','Lead',base,{eventID:'l_'+uuid()});
    fbq('trackCustom','LineClick',base,{eventID:'lc_'+uuid()});
  }

  function handleClick(e){
    e.preventDefault();
    if(hasClicked) return;
    hasClicked = true;

    var area = this.dataset.area || "main_cta";
    fireEvents(area);

    setTimeout(function(){
      window.location.href = LINE_URL;
    }, REDIRECT_DELAY);
  }

  document.querySelectorAll('.goLine').forEach(function(el){
    el.addEventListener('click', handleClick, { passive:false });
  });
})();
</script>

</body>
