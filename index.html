<style>
body{
  margin:0;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial;
}
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
}
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.logo{
  position:absolute;
  top:5%;
  left:10%;
  transform:translateX(10%);
  width:60%;
}
.ip{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
}
.btnWrapper{
  position:absolute;
  bottom:6%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
}
.btn{
  width:100%;
  cursor:pointer;
  display:block;
  animation:breath 1.8s ease-in-out infinite;
}
@keyframes breath{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager">
    <img src="assets/logo.png" class="logo" alt="" loading="eager">
    <img src="assets/ip.png" class="ip" alt="" loading="eager">

    <div class="btnWrapper">
      <!-- href 放真連結：就算 JS 沒載入也能跳 -->
      <a href="https://line.me/R/ti/p/@h1788" id="lineBtn" rel="noopener">
        <img src="assets/btn.png" class="btn" alt="加入LINE" loading="eager">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const LINE_URL = "https://line.me/R/ti/p/@h1788";

  function uuidv4(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  let clicked = false;

  const btn = document.getElementById("lineBtn");
  if(!btn) return;

  btn.addEventListener("click", function(e){
    e.preventDefault();
    if(clicked) return;
    clicked = true;

    const eventId = uuidv4();
    const opt = { eventID: eventId };

    // 乾淨可讀的參數（自訂參數OK）
    const params = {
      action_source: "website",
      contact_method: "line",
      event_source_url: window.location.href
    };

    // 主轉換事件：Contact（對應後台「聯絡」）
    try { fbq('trackSingle', '1646970479225047', 'Contact', params, opt); } catch(err) {}
    try { fbq('trackSingle', '1319847283283747', 'Contact', params, opt); } catch(err) {}

    // 輔助自訂事件（可留可不留，但要指定 pixel 才會穩）
    try { fbq('trackSingleCustom', '1646970479225047', 'LineClick', params, opt); } catch(err) {}
    try { fbq('trackSingleCustom', '1319847283283747', 'LineClick', params, opt); } catch(err) {}

    // 延遲跳轉：讓事件更穩送出
    setTimeout(function(){
      window.location.replace(LINE_URL);
    }, 600);
  });
})();
</script>

</body>
</html>
