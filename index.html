<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;
}

.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100svh;
  background:#000;
}

.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  pointer-events:none;
}

.logo{
  position:absolute;
  top:5%;
  left:10%;
  transform:translateX(10%);
  width:60%;
  z-index:2;
  pointer-events:none;
}

.ip{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  z-index:2;
  pointer-events:none;
}

.btnWrapper{
  position:absolute;
  bottom:6%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  z-index:10;
}

.goLine{
  display:block;
  width:100%;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}

.btn{
  display:block;
  width:100%;
  height:auto;
  cursor:pointer;
  animation:breath 1.8s ease-in-out infinite;
  will-change:transform;
}

@keyframes breath{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager" decoding="async">
    <img src="assets/logo.png" class="logo" alt="" loading="eager" decoding="async">
    <img src="assets/ip.png" class="ip" alt="" loading="eager" decoding="async">

    <!-- 只有真正按鈕 Btn 可以點擊 -->
    <div class="btnWrapper">
      <a href="https://line.me/R/ti/p/@h1788"
         class="goLine"
         data-area="btn"
         rel="noopener"
         aria-label="加入 LINE">
        <img src="assets/btn.png" class="btn" alt="加入 LINE" loading="eager" decoding="async">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const PIXEL_ID = "3464251250416725";
  const LINE_URL = "https://line.me/R/ti/p/@h1788";
  // 建立此品牌專屬 Worker 後，只需把下方網址替換成實際 workers.dev 網址，保留 /track
  const CAPI_ENDPOINT = "https://jx888bet.skype138388.workers.dev/track";
  const EVENT_NAME = "CompleteRegistration";
  const REDIRECT_DELAY_MS = 1800;

  let clicked = false;

  function createEventId(){
    if(window.crypto && typeof window.crypto.randomUUID === "function"){
      return "reg_" + window.crypto.randomUUID();
    }
    return "reg_" + Date.now() + "_" + Math.random().toString(36).slice(2,12);
  }

  function getCookie(name){
    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const match = document.cookie.match(new RegExp("(?:^|;\\s*)" + escaped + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : "";
  }

  function getFbc(){
    const cookie = getCookie("_fbc");
    if(cookie) return cookie;
    const fbclid = new URLSearchParams(location.search).get("fbclid");
    return fbclid ? "fb.1." + Date.now() + "." + fbclid : "";
  }

  function fireBrowserEvent(eventId, area){
    if(typeof window.fbq !== "function") return;
    window.fbq(
      "trackSingle",
      PIXEL_ID,
      EVENT_NAME,
      {contact_method:"line", click_area:area},
      {eventID:eventId}
    );
  }

  async function fireServerEvent(eventId, area){
    if(CAPI_ENDPOINT.includes("YOUR-WORKER")){
      throw new Error("請先設定 CAPI_ENDPOINT");
    }

    const payload = {
      event_name: EVENT_NAME,
      event_id: eventId,
      event_source_url: location.href,
      fbp: getCookie("_fbp"),
      fbc: getFbc(),
      click_area: area
    };

    const response = await fetch(CAPI_ENDPOINT, {
      method: "POST",
      mode: "cors",
      credentials: "omit",
      cache: "no-store",
      keepalive: true,
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    const text = await response.text();
    let result;
    try { result = JSON.parse(text); }
    catch { result = {ok:false,error:"Worker 回應不是 JSON",raw:text}; }

    if(!response.ok || !result.ok){
      throw new Error(result.error || result.meta_error?.error?.message || "CAPI 送出失敗");
    }
    return result;
  }

  function goLine(){ location.assign(LINE_URL); }

  const buttons = document.querySelectorAll(".goLine");
  buttons.forEach(function(btn){
    btn.setAttribute("href", LINE_URL);
    btn.addEventListener("click", function(e){
      e.preventDefault();
      if(clicked) return;
      clicked = true;

      const area = btn.dataset.area || "btn";
      const eventId = createEventId();
      fireBrowserEvent(eventId, area);

      let redirected = false;
      const redirectOnce = function(){
        if(redirected) return;
        redirected = true;
        goLine();
      };

      const timer = setTimeout(redirectOnce, REDIRECT_DELAY_MS);
      fireServerEvent(eventId, area)
        .then(function(result){ console.log("CAPI success", result); })
        .catch(function(error){ console.error("CAPI error", error); })
        .finally(function(){
          clearTimeout(timer);
          setTimeout(redirectOnce, 250);
        });
    }, {passive:false});
  });

  window.addEventListener("pageshow", function(){ clicked = false; });
})();
</script>
</body>
</html>
